# Render Blueprint for the CvSU-CCAT GAD Corner website + CMS
# Deploy: push this repo to GitHub, then on https://render.com
# choose "New +" > "Blueprint" and point it at your repository.
services:
  - type: web
    name: gad-corner
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Set a strong admin password here (Render dashboard > Environment).
      - key: ADMIN_PASSWORD
        sync: false
    # NOTE: The free plan has an EPHEMERAL filesystem — CMS edits and uploads
    # reset when the service restarts/redeploys. For a persistent live site,
    # upgrade to a paid instance and uncomment the disk + env vars below.
    #
    # envVars (add these two on a paid plan):
    #   - key: DATA_DIR
    #     value: /var/data
    #   - key: UPLOAD_DIR
    #     value: /var/data/uploads
    # disk:
    #   name: gad-data
    #   mountPath: /var/data
    #   sizeGB: 1
